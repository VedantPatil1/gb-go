# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  GREETING: Hello, world!

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  docs:dev:
    desc: Run the Zensical documentation server with live reloading
    cmds:
      - uv run zensical serve

